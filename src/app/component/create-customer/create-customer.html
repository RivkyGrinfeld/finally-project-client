<div class="container">

  <!-- שלב 1 -->
  <form *ngIf="step === 1" [formGroup]="personalForm" class="card" [@stepAnimation]>

    <div class="tabs">
      <div class="tab active">אישי</div>
      <div class="tab">קובץ</div>
    </div>

    <div class="field">
      <input formControlName="firstName" required>
      <label>שם פרטי</label>
    </div>

    <div class="field">
      <input formControlName="lastName" required>
      <label>שם משפחה</label>
    </div>

    <div class="field">
      <input formControlName="city" required>
      <label>עיר</label>
    </div>

    <div class="field">
      <input formControlName="id" required>
      <label>מס' זהות</label>
    </div>

    <div class="field">
      <input formControlName="email" required>
      <label>אימייל</label>
    </div>

    <div class="field">
      <input formControlName="userName" required>
      <label>שם משתמש</label>
    </div>

    <div class="field">
      <input formControlName="password" required>
      <label>סיסמה</label>
    </div>

    <div class="field">
      <input formControlName="phone" required>
      <label>טלפון</label>
    </div>

    <div class="field">
      <label for="branch">ענף</label>
      <select formControlName="branchId" required>
        <option *ngFor="let branch of branches" [value]="branch.id">
          {{ branch.description }}
        </option>
      </select>
    </div>

    <button type="button" class="btn" (click)="next()">
      המשך
    </button>

  </form>

  <!-- שלב 2 - קובץ -->
  <form *ngIf="step === 2" [formGroup]="fileForm" class="card" [@stepAnimation]>

    <div class="tabs">
      <div class="tab">אישי</div>
      <div class="tab active">קובץ</div>
    </div>

    <div class="upload-box">
      <input type="file" (change)="onFileChange($event)">
    </div>

    <button type="button" class="btn" (click)="prev()">חזור</button>
    <button type="button" class="btn" (click)="submit()" [disabled]="fileForm.invalid">
      סיום
    </button>

  </form>

</div>
