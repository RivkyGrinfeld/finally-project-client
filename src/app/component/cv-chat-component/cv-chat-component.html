<div *ngIf="!isPro()" class="pro-gate">
  <div class="pro-gate-card">
    <div class="pro-shimmer"></div>
    <div class="pro-gate-badge">PRO</div>
    <h2>יצירת קורות חיים עם AI</h2>
    <p class="pro-subtitle">הצ'אט החכם שלנו ישאל אותך שאלות ויבנה עבורך קובץ קו"ח מקצועי ומעוצב — תוך דקות</p>
    <div class="pro-features">
      <div class="pro-feature">
        <span class="feature-check">✓</span>
        <span>יצירת קו"ח מותאם אישית</span>
      </div>
      <div class="pro-feature">
        <span class="feature-check">✓</span>
        <span>עיצוב מקצועי מוכן להדפסה</span>
      </div>
      <div class="pro-feature">
        <span class="feature-check">✓</span>
        <span>הורדה מיידית כ-PDF</span>
      </div>
    </div>
    <button class="btn-upgrade" (click)="goToPayment()">שדרג ל-PRO</button>
    <p class="pro-price-hint">החל מ-₪29 לחודש</p>
  </div>
</div>

<div *ngIf="isPro()" class="chat-wrapper">
  <!-- Chat Header -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="ai-avatar">AI</div>
      <div>
        <h3>יצירת קורות חיים</h3>
        <span class="chat-status">פעיל</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="chat-messages">
    <div *ngFor="let msg of messages" class="msg-row" [class.user-row]="msg.role==='user'" [class.ai-row]="msg.role==='assistant'">
      <div class="msg-avatar" *ngIf="msg.role==='assistant'">AI</div>
      <div [ngClass]="{'user-msg': msg.role==='user', 'ai-msg': msg.role==='assistant'}">
        <span>{{ msg.content }}</span>
      </div>
    </div>
    <div *ngIf="isLoading" class="msg-row ai-row">
      <div class="msg-avatar">AI</div>
      <div class="ai-msg loading-msg">
        <span class="typing-dots">
          <span></span><span></span><span></span>
        </span>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div *ngIf="question || questionAi" class="chat-input">
    <input [(ngModel)]="answer" placeholder="הקלד את תשובתך..." (keyup.enter)="sendAnswer()" [disabled]="isLoading" />
    <button (click)="sendAnswer()" [disabled]="isLoading" class="send-btn">שלח</button>
  </div>

  <!-- Done -->
  <div *ngIf="!question && !questionAi && messages.length > 1" class="chat-done">
    <div class="done-icon">✓</div>
    <p>קורות החיים מוכנים להורדה</p>
  </div>
</div>
