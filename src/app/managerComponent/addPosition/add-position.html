<div class="form-modal">
  <div class="form-container">
    <div class="form-header">
      <h2>הוספת תפקיד</h2>
      <button class="btn-close" type="button" (click)="close()">✕</button>
    </div>
    <form [formGroup]="positionForm" (ngSubmit)="submit()" class="form-content">
      <div class="form-group">
        <label>ענף</label>
        <select formControlName="branchId" class="form-control">
          <option *ngFor="let branch of branches" [value]="branch.id">{{branch.description}}</option>
        </select>
      </div>
      <div class="form-group">
        <label>תיאור התפקיד</label>
        <input type="text" formControlName="description" placeholder="לדוגמה: מפתח Backend" class="form-control">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save">שמור</button>
        <button type="button" class="btn-cancel" (click)="close()">ביטול</button>
      </div>
    </form>
  </div>
</div>
