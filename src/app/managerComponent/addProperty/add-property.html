<div class="form-modal">
  <div class="form-container">
    <div class="form-header">
      <h2>הוספת מאפיין</h2>
      <button class="btn-close" type="button" (click)="close()">✕</button>
    </div>
    <form [formGroup]="propertyForm" (ngSubmit)="submit()" class="form-content">
      <div class="form-group">
        <label>תיאור המאפיין</label>
        <input type="text" formControlName="description" placeholder="לדוגמה: עבודת צוות" class="form-control">
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-save">שמור</button>
        <button type="button" class="btn-cancel" (click)="close()">ביטול</button>
      </div>
    </form>
  </div>
</div>
